name: 构建 Android APK

# 手动触发，不自动构建
on:
  workflow_dispatch:
    inputs:
      debug:
        description: '调试模式'
        required: false
        default: false
        type: boolean

jobs:
  build:
    name: 构建 APK (arm64-v8a)
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libltdl-dev \
            libffi-dev \
            libssl-dev \
            autoconf \
            automake \
            libtool \
            pkg-config \
            ccache \
            ninja-build \
            git \
            wget \
            unzip \
            openjdk-17-jdk \
            python3-distutils

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install buildozer cython

      - name: 准备 Python 3.14 Android 兼容补丁
        run: |
          # 在 p4a 被 buildozer 下载后，自动应用我们的补丁
          # 通过创建 Python 3 配方的 hook 脚本
          # 这个路径会被 buildozer 在构建时使用
          mkdir -p ~/.buildozer
          echo "补丁文件已就绪"

      - name: 缓存 Buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            !~/.buildozer/android/platform/build-*
            !~/.buildozer/android/platform/python-for-android
          key: buildozer-cache-v1-${{ runner.os }}

      - name: 构建 APK
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64

          echo "=== 开始构建 ==="
          echo "Python: $(python3 --version)"
          echo "Buildozer: $(buildozer --version 2>&1)"
          echo "Java: $(java -version 2>&1 | head -1)"

          # 第一次构建：p4a 会自动下载到 .buildozer 目录
          # 如果因为 Python 3.14 问题失败，我们打上补丁重试
          buildozer android debug 2>&1 | tee build_log.txt

          # 检查是否因为 remote_debug 问题失败
          if grep -q "search_linux_map_for_section" build_log.txt 2>/dev/null; then
            echo ""
            echo "=========================================="
            echo "检测到 Python 3.14 Android 兼容问题，正在打补丁后重试..."
            echo "=========================================="

            # 找到 p4a 的 python3 recipe 目录
            P4A_PYTHON3_DIR=$(find .buildozer -path "*/python-for-android/pythonforandroid/recipes/python3" -type d | head -1)
            if [ -n "$P4A_PYTHON3_DIR" ]; then
              echo "找到 p4a python3 配方目录: $P4A_PYTHON3_DIR"

              # 复制补丁脚本
              cp patches/fix_python_android.py "$P4A_PYTHON3_DIR/patches/"

              # 修改配方，在 prebuild_arch 中调用补丁
              RECIPE_FILE="$P4A_PYTHON3_DIR/__init__.py"
              # 在 import os 那一行后添加
              sed -i 's/import os/import os, subprocess, sys/' "$RECIPE_FILE"

              # 在 prebuild_arch 的末尾添加补丁调用
              # 找到 super().prebuild_arch(arch) 这一行
              PATCH_CODE='        # Fix Android remote_debug compilation for 3.14\n        fix_script = os.path.join(os.path.dirname(__file__), "patches", "fix_python_android.py")\n        if os.path.exists(fix_script):\n            subprocess.run([sys.executable, fix_script, build_dir], check=False)\n        self.ctx.python_recipe = self'
              sed -i "s/        self.ctx.python_recipe = self/$PATCH_CODE/" "$RECIPE_FILE"

              echo "补丁已应用到: $P4A_PYTHON3_DIR"
              grep -n "fix_python_android\|remote_debug" "$RECIPE_FILE" | head -5

              # 清理旧的构建产物并重试
              rm -rf .buildozer/android/platform/build-arm64-v8a
              buildozer android debug 2>&1 | tee build_log.txt
            fi
          fi

      - name: 检查构建结果
        run: |
          echo "=== 构建结果 ==="
          if ls bin/*.apk 1>/dev/null 2>&1; then
            echo "✅ APK 构建成功！"
            ls -la bin/*.apk
            echo "APK 大小: $(du -h bin/*.apk | cut -f1)"
          else
            echo "❌ 构建失败"
            echo "最后50行日志:"
            tail -50 build_log.txt 2>/dev/null || echo "无日志"
          fi

      - name: 上传 APK 到构建产物
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: 专业随机工具-APK
          path: |
            bin/*.apk
          if-no-files-found: warn
          retention-days: 7
