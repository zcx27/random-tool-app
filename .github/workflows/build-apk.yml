name: 构建 Android APK

# 手动触发，不自动构建
on:
  workflow_dispatch:
    inputs:
      debug:
        description: '调试模式'
        required: false
        default: false
        type: boolean

jobs:
  build:
    name: 构建 APK (arm64-v8a)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libltdl-dev \
            libffi-dev \
            libssl-dev \
            autoconf \
            automake \
            libtool \
            pkg-config \
            ccache \
            ninja-build \
            git \
            wget \
            unzip \
            openjdk-17-jdk

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install buildozer cython

      - name: 准备构建
        run: |
          echo "使用 Python 3.12 + Kivy 2.3.0"

      - name: 缓存 Buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            !~/.buildozer/android/platform/build-*
            !~/.buildozer/android/platform/python-for-android
          key: buildozer-cache-v2-${{ runner.os }}

      - name: 构建 APK
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64

          echo "=== 开始构建 ==="
          echo "Python: $(python3 --version)"
          echo "Buildozer: $(buildozer --version 2>&1)"
          echo "Java: $(java -version 2>&1 | head -1)"

          buildozer android debug 2>&1 | tee build_log.txt

      - name: 检查构建结果
        run: |
          echo "=== 构建结果 ==="
          if ls bin/*.apk 1>/dev/null 2>&1; then
            echo "✅ APK 构建成功！"
            ls -la bin/*.apk
            echo "APK 大小: $(du -h bin/*.apk | cut -f1)"
          else
            echo "❌ 构建失败"
            echo "最后50行日志:"
            tail -50 build_log.txt 2>/dev/null || echo "无日志"
          fi

      - name: 上传 APK 到构建产物
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: 专业随机工具-APK
          path: |
            bin/*.apk
          if-no-files-found: warn
          retention-days: 7
